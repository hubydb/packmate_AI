<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>零件包装方案推荐 - 输入零件参数</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #0052d9;
  --primary-light: #e8f0fe;
  --success: #2ba471;
  --warning: #e37318;
  --danger: #d54941;
  --gray-1: #1c2435;
  --gray-2: #4f5d73;
  --gray-3: #8a94a6;
  --gray-4: #c0c6d1;
  --gray-5: #e8ecf0;
  --gray-6: #f3f5f7;
  --radius: 8px;
  --shadow: 0 2px 8px rgba(0,0,0,.08);
}
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  color: var(--gray-1);
  background: var(--gray-6);
  line-height: 1.6;
  min-height: 100vh;
}
.header {
  background: #fff;
  border-bottom: 1px solid var(--gray-5);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.header h1 { font-size: 18px; font-weight: 600; color: var(--primary); }
.header .badge {
  padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: 500;
  background: var(--primary-light); color: var(--primary);
}
.mode-tag {
  margin-left: auto; padding: 3px 12px; border-radius: 10px;
  font-size: 12px; font-weight: 600;
}
.mode-tag.online { background: #e8f8ef; color: #2ba471; }
.mode-tag.offline { background: #fef3e8; color: #e37318; }
.main { max-width: 1220px; margin: 24px auto; padding: 0 24px; }
.card {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 24px 28px;
  margin-bottom: 20px;
}
.card-title {
  font-size: 16px; font-weight: 600; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 0 20px; height: 36px; border: 1px solid var(--gray-4);
  border-radius: 4px; font-size: 14px; cursor: pointer; transition: all .2s;
  background: #fff; color: var(--gray-1); text-decoration: none;
}
.btn:hover { border-color: var(--gray-3); }
.btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn-primary:hover { background: #0041b3; }
.btn-success { background: var(--success); color: #fff; border-color: var(--success); }
.btn-danger { background: #fff; color: var(--danger); border-color: var(--danger); }
.btn-lg { height: 42px; padding: 0 32px; font-size: 15px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-group { display: flex; gap: 12px; margin-top: 20px; }
.steps {
  display: flex; gap: 0; background: #fff; padding: 16px 32px; border-bottom: 1px solid var(--gray-5);
}
.step-item {
  display: flex; align-items: center; gap: 8px; padding: 8px 20px; border-radius: var(--radius);
  font-size: 14px; color: var(--gray-3); text-decoration: none;
}
.step-item.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
.step-item .step-num {
  width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; background: var(--gray-5); color: var(--gray-3); flex-shrink: 0;
}
.step-item.active .step-num { background: var(--primary); color: #fff; }
.step-arrow { width: 16px; text-align: center; color: var(--gray-4); font-size: 12px; flex-shrink: 0; }
.form-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px;
}
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-size: 13px; color: var(--gray-2); font-weight: 500; }
.form-group label .required { color: var(--danger); margin-left: 2px; }
.form-group input, .form-group select, .form-group textarea {
  height: 36px; padding: 0 12px; border: 1px solid var(--gray-4); border-radius: 4px;
  font-size: 14px; color: var(--gray-1); outline: none; background: #fff;
}
.form-group textarea { height: 80px; padding: 8px 12px; resize: vertical; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--primary); box-shadow: 0 0 0 2px rgba(0,82,217,.12);
}
.img-preview { max-width: 100%; max-height: 180px; border-radius: 4px; object-fit: contain; }
.img-upload {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 24px; border: 2px dashed var(--gray-4); border-radius: 8px; cursor: pointer;
  transition: border-color .2s, background .2s;
}
.img-upload:hover { border-color: var(--primary); background: var(--primary-light); }
.img-upload input[type="file"] { display: none; }
.img-upload .upload-icon { font-size: 32px; margin-bottom: 8px; }
.img-upload .upload-text { font-size: 13px; color: var(--gray-2); }
.alert { padding: 12px 16px; border-radius: var(--radius); font-size: 13px; margin-bottom: 16px; display: flex; align-items: flex-start; gap: 8px; }
.alert-info { background: var(--primary-light); color: var(--primary); }
.alert-warning { background: #fef3e8; color: var(--warning); }
.alert-success { background: #e8f8ef; color: var(--success); }
.alert-error { background: #fef0ef; color: var(--danger); }
.batch-card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px 24px; margin-bottom: 16px; }
.batch-card .card-title { font-size: 16px; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.batch-card .alert { padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 14px; background: #e8f0fe; color: #0052d9; }
.batch-card .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
.batch-progress-wrap { height: 6px; background: #e8ecf0; border-radius: 3px; overflow: hidden; margin: 8px 0; }
.batch-progress-fill { height: 100%; background: #0052d9; width: 0%; transition: width .3s; }
.batch-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.batch-table th, .batch-table td { padding: 7px 12px; border-bottom: 1px solid #e8ecf0; text-align: left; white-space: nowrap; }
.batch-table th { background: #f3f5f7; font-weight: 600; color: var(--gray-2); font-size: 12px; position: sticky; top: 0; z-index: 1; }
.batch-table tr:hover td { background: #f8f9fb; }
.batch-table .pred-col { font-weight: 700; color: var(--primary); }
.batch-table .correct-col { color: var(--success); font-weight: 600; }
.batch-table .wrong-col { color: var(--danger); font-weight: 600; }
.batch-table .err-col { color: var(--danger); font-size: 12px; }
.batch-table-wrap { overflow-x: auto; max-height: 420px; overflow-y: auto; border: 1px solid var(--gray-5); border-radius: 4px; }
.batch-result-summary { margin-bottom: 10px; font-size: 13px; color: var(--gray-2); }
.pkg-modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center; }
.pkg-modal-overlay.hidden { display: none; }
.pkg-modal { background: #fff; border-radius: 8px; width: 90%; max-width: 900px; max-height: 90vh; display: flex; flex-direction: column; }
.pkg-modal-header { padding: 16px 20px; border-bottom: 1px solid #e8ecf0; display: flex; align-items: center; justify-content: space-between; }
.pkg-modal-header h3 { font-size: 16px; font-weight: 600; color: #1c2435; }
.pkg-modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #8f9eb3; line-height: 1; }
.pkg-modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
.pkg-modal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
.pkg-modal-card { border: 2px solid #e8ecf0; border-radius: 6px; padding: 12px; cursor: pointer; transition: all .2s; }
.pkg-modal-card:hover { border-color: #0052d9; }
.pkg-modal-card.selected { border-color: #0052d9; background: #e8f0fe; }
.pkg-modal-card .card-size { font-size: 14px; font-weight: 600; color: #1c2435; margin-bottom: 4px; }
.pkg-modal-card .card-mat { font-size: 12px; color: #8f9eb3; line-height: 1.6; }
.pkg-modal-card .check-mark { float: right; color: #0052d9; font-weight: 700; display: none; }
.pkg-modal-card.selected .check-mark { display: inline; }
.pkg-modal-footer { padding: 12px 20px; border-top: 1px solid #e8ecf0; display: flex; justify-content: flex-end; gap: 8px; }
.layout-diagram { background: var(--gray-6); border-radius: var(--radius); padding: 16px; margin-top: 16px; min-height: 240px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.layout-diagram canvas { border: 1px solid var(--gray-4); border-radius: 4px; background: #fff; }
@media (max-width: 768px) {
  .main { padding: 0 12px; }
  .steps { padding: 12px 16px; overflow-x: auto; }
  .step-item { padding: 6px 12px; font-size: 13px; white-space: nowrap; }
  .form-grid { grid-template-columns: 1fr; }
}
#loadCharsCheckboxes label:has(input:checked) { background: #e8f0fe; border-color: #0052d9; color: #0052d9; }
</style>
</head>
<body>
<header class="header">
  <h1>零件包装方案推荐</h1>
  <span class="badge" id="statusBadge">等待输入</span>
  <span class="mode-tag offline" id="modeTag">离线预测模式</span>
</header>
<nav class="steps">
  <a href="/step1.html" class="step-item active"><span class="step-num">1</span><span>输入零件参数</span></a>
  <span class="step-arrow">›</span>
  <a href="/step2.html" class="step-item"><span class="step-num">2</span><span>推荐包装方式</span></a>
  <span class="step-arrow">›</span>
  <a href="/step3.html" class="step-item"><span class="step-num">3</span><span>包装成本测算</span></a>
</nav>
<main class="main">
  <div class="card">
    <div class="card-title"><span class="icon">📦</span> 零部件基础信息</div>
    <div class="alert alert-info">请录入零部件的基本参数，系统将基于这些信息推荐最优包装方式。</div>
    <div class="form-grid">
      <div class="form-group"><label>零件号 <span class="required">*</span></label><input type="text" id="partNo" placeholder="例如 5401234-A01" /></div>
      <div class="form-group"><label>零件名称 <span class="required">*</span></label><input type="text" id="partName" placeholder="例如 前保险杠本体" /></div>
      <div class="form-group"><label>长 (mm) <span class="required">*</span></label><input type="number" id="partL" placeholder="长度" min="1" /></div>
      <div class="form-group"><label>宽 (mm) <span class="required">*</span></label><input type="number" id="partW" placeholder="宽度" min="1" /></div>
      <div class="form-group"><label>高 (mm) <span class="required">*</span></label><input type="number" id="partH" placeholder="高度" min="1" /></div>
      <div class="form-group"><label>单件重量 (kg)</label><input type="number" id="partWeight" placeholder="单件重量" min="0" step="0.01" /></div>
      <div class="form-group"><label>单件最大承重 (kg)</label><input type="number" id="partMaxLoad" placeholder="单箱最大承载重量" min="0" step="0.1" /></div>
      <div class="form-group"><label>零件装载特性</label><div id="loadCharsCheckboxes" style="display:flex;flex-wrap:wrap;gap:6px;padding-top:4px;"></div></div>
      <div class="form-group"><label>零件数量</label><input type="number" id="partQty" placeholder="本次采购/生产的件数" min="1" /></div>
      <div class="form-group"><label>经济批次量</label><input type="number" id="batchQty" placeholder="默认48" value="48" min="1" /></div>
      <div class="form-group"><label>包装等级分类</label><select id="feat_包装等级分类"><option value="">-- 请选择 --</option></select></div>
      <div class="form-group"><label>零件分类</label><select id="partCategory"><option value="A">A类 — 极其重要大件（涂装/总装）</option><option value="B" selected>B类 — 来料供应商件</option><option value="C">C类 — 标准件</option></select></div>
      <div class="form-group"><label>单车用量</label><input type="number" id="feat_单车用量" placeholder="请输入单车用量" step="any" /></div>
      <div class="form-group"><label>零件种类</label><select id="feat_零件种类"><option value="">-- 请选择 --</option></select></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span class="icon">⚙️</span> 包装附加参数</div>
    <div class="form-grid">
      <div class="form-group"><label>单件包装缓冲厚度 (mm)</label><input type="number" id="bufferThickness" value="0" min="0" /></div>
      <div class="form-group"><label>形变公差 (mm)</label><input type="number" id="deformationTol" value="0" min="0" /></div>
      <div class="form-group"><label>包装材料</label><select id="pkgMaterial"><option value="wood">木箱</option><option value="carton">纸箱</option><option value="iron">铁箱</option></select></div>
      <div class="form-group"><label>是否需防锈处理</label><select id="antiRust"><option value="no">否</option><option value="yes">是</option></select></div>
      <div class="form-group"><label>包装袋情况</label><select id="feat_包装袋情况"><option value="">-- 请选择 --</option></select></div>
      <div class="form-group"><label>干燥剂情况</label><select id="feat_干燥剂情况"><option value="">-- 请选择 --</option></select></div>
      <div class="form-group"><label>操作人员</label><input type="text" id="operator" placeholder="记录本次操作人员姓名" /></div>
      <div class="form-group"><label>备注</label><textarea id="remark" placeholder="请输入备注信息" rows="2"></textarea></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span class="icon">📷</span> 零部件图片</div>
    <div class="img-upload" id="imgUpload">
      <input type="file" accept="image/*" id="imgFile" />
      <span class="upload-icon">📁</span>
      <span class="upload-text">点击或拖拽上传零部件图片</span>
    </div>
    <div id="imgPreviewWrap" style="display:none; margin-top:12px;">
      <img id="imgPreview" class="img-preview" alt="零部件图片" />
      <button type="button" class="btn btn-danger" style="margin-top:8px" onclick="removeImage()">移除图片</button>
    </div>
  </div>

  <div class="batch-card" id="confirmAddCard">
    <div class="card-title"><span class="icon">📝</span> 手动录入零件</div>
    <div class="btn-row">
      <button type="button" class="btn btn-success btn-lg" id="confirmAddBtn" onclick="addManualPart()">✅ 确认添加</button>
    </div>
  </div>

  <div class="batch-card" id="manualPartsCard" style="display:none;">
    <div class="card-title"><span class="icon">📋</span> 已录入零件 <span id="manualPartsCount" style="font-size:13px;color:var(--gray-2);font-weight:normal;"></span></div>
    <div class="alert" id="manualPartsAlert">手动录入的零件信息，点击"确认添加"后将显示在下方列表中。</div>
    <div class="batch-table-wrap">
      <table class="batch-table"><thead id="manualPartsHead"></thead><tbody id="manualPartsBody"></tbody></table>
    </div>
    <div style="margin-top:12px;display:flex;gap:10px;">
      <button class="btn btn-danger" id="clearManualPartsBtn" onclick="clearManualPartsList()">🗑 清空全部</button>
      <button class="btn btn-primary" id="toStep2Btn" onclick="goStep2FromManual()" style="display:none;">下一步：推荐包装方式 ›</button>
    </div>
  </div>

  <div class="batch-card" id="batchCard">
    <div class="card-title"><span class="icon">📦</span> 批量预测</div>
    <div class="alert">上传包含零件特征数据的 CSV 文件，批量预测 CKD 包装类型。</div>
    <div class="btn-row">
      <button class="btn btn-primary" id="batchSelectBtn" onclick="document.getElementById('batchCsvInput').click()">📂 选择 CSV 文件</button>
      <span id="batchFileName" style="font-size:13px;color:var(--gray-2);"></span>
      <input type="file" id="batchCsvInput" accept=".csv" style="display:none" onchange="handleBatchCsv(this.files[0])" />
      <div style="display:flex;align-items:center;gap:6px;margin-left:16px;">
        <label style="font-size:13px;color:var(--gray-2);white-space:nowrap;">请输入批量：</label>
        <input type="number" id="batchSizeInput" min="1" step="1" placeholder="正整数" style="height:32px;padding:0 10px;border:1px solid var(--gray-4);border-radius:4px;font-size:13px;width:80px;" />
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-success btn-lg" id="batchPredictBtn" onclick="runBatchPrediction()" disabled>🚀 开始批量预测</button>
      <button class="btn btn-lg" id="batchExportBtn" onclick="exportBatchResults()" disabled>💾 导出结果 CSV</button>
      <button class="btn btn-lg" onclick="clearBatchResults()">🗑 清空</button>
    </div>
    <div id="batchProgressArea" style="display:none; margin-bottom:12px;">
      <div class="batch-progress-wrap"><div class="batch-progress-fill" id="batchProgressBar"></div></div>
      <div style="font-size:13px;color:var(--gray-2);margin-top:4px;" id="batchProgressText"></div>
    </div>
    <div id="batchResultsArea" style="display:none;">
      <div class="batch-result-summary" id="batchResultSummary"></div>
      <div class="batch-table-wrap">
        <table class="batch-table"><thead id="batchResultsHead"></thead><tbody id="batchResultsBody"></tbody></table>
      </div>
    </div>
  </div>

  <!-- Pkg method modal (shared for manual/batch in step1) -->
  <div class="pkg-modal-overlay hidden" id="pkgModalOverlay" onclick="if(event.target===this)closePkgModal()">
    <div class="pkg-modal">
      <div class="pkg-modal-header"><h3 id="pkgModalTitle">选择包装方式</h3><button class="pkg-modal-close" onclick="closePkgModal()">&times;</button></div>
      <div class="pkg-modal-body">
        <div id="pkgModalHeader" style="margin-bottom:12px;font-size:13px;color:var(--gray-2);"></div>
        <div style="margin-bottom:12px;">
          <label style="font-size:13px;color:var(--gray-2);margin-right:8px;">包装材料：</label>
          <select id="pkgModalMaterial" onchange="changeModalMaterial(this.value)" style="border:1px solid #ddd;border-radius:4px;padding:4px 8px;font-size:13px;cursor:pointer;">
            <option value="STD">STD</option><option value="carton">纸箱</option><option value="tdg">天地盖纸箱</option><option value="wood">木箱</option><option value="iron">铁架/轻钢</option>
          </select>
        </div>
        <div style="display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;">
          <div class="layout-diagram" style="flex:0 0 auto;"><canvas id="pkgPreviewCanvas" width="340" height="300"></canvas><p style="color:var(--gray-3);font-size:12px;margin-top:4px;">💡 拖动图形可旋转视角</p></div>
          <div class="pkg-modal-grid" id="pkgModalGrid" style="flex:1;min-width:280px;"></div>
        </div>
      </div>
      <div class="pkg-modal-footer"><button class="btn" onclick="closePkgModal()">取消</button><button class="btn btn-primary" onclick="confirmPkgSelection()">确认选择</button></div>
    </div>
  </div>

  <div class="btn-group">
    <button type="button" class="btn btn-primary btn-lg" onclick="runPrediction()">下一步：推荐包装方式 ›</button>
  </div>
</main>

<script src="/js/common.js"></script>
<script src="/js/api.js"></script>
<script src="/js/pack.js"></script>
<script src="/js/step1.js"></script>
<script src="/js/modal.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async function() {
  var loaded = await loadModelFromApi();
  if (!loaded && window.LGB_MODEL) { state.model = window.LGB_MODEL; }
  initStep1();
});
</script>
</body>
</html>
