<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>零件包装方案推荐 - 包装成本测算</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #0052d9;
  --primary-light: #e8f0fe;
  --success: #2ba471;
  --warning: #e37318;
  --danger: #d54941;
  --gray-1: #1c2435;
  --gray-2: #4f5d73;
  --gray-3: #8a94a6;
  --gray-4: #c0c6d1;
  --gray-5: #e8ecf0;
  --gray-6: #f3f5f7;
  --radius: 8px;
  --shadow: 0 2px 8px rgba(0,0,0,.08);
}
body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; color: var(--gray-1); background: var(--gray-6); line-height: 1.6; min-height: 100vh; }
.header { background: #fff; border-bottom: 1px solid var(--gray-5); padding: 16px 32px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.header h1 { font-size: 18px; font-weight: 600; color: var(--primary); }
.header .badge { padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: 500; background: var(--primary-light); color: var(--primary); }
.main { max-width: 1220px; margin: 24px auto; padding: 0 24px; }
.card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px 28px; margin-bottom: 20px; }
.card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 0 20px; height: 36px; border: 1px solid var(--gray-4); border-radius: 4px; font-size: 14px; cursor: pointer; transition: all .2s; background: #fff; color: var(--gray-1); text-decoration: none; }
.btn:hover { border-color: var(--gray-3); }
.btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn-primary:hover { background: #0041b3; }
.btn-lg { height: 42px; padding: 0 32px; font-size: 15px; }
.btn-group { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
.steps { display: flex; gap: 0; background: #fff; padding: 16px 32px; border-bottom: 1px solid var(--gray-5); }
.step-item { display: flex; align-items: center; gap: 8px; padding: 8px 20px; border-radius: var(--radius); font-size: 14px; color: var(--gray-3); text-decoration: none; }
.step-item.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
.step-item .step-num { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; background: var(--gray-5); color: var(--gray-3); flex-shrink: 0; }
.step-item.active .step-num { background: var(--primary); color: #fff; }
.step-arrow { width: 16px; text-align: center; color: var(--gray-4); font-size: 12px; flex-shrink: 0; }
.alert { padding: 12px 16px; border-radius: var(--radius); font-size: 13px; margin-bottom: 16px; display: flex; align-items: flex-start; gap: 8px; }
.alert-success { background: #e8f8ef; color: var(--success); }
.scheme-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 13px; }
.scheme-table th { background: var(--gray-6); padding: 10px 12px; text-align: left; font-weight: 600; color: var(--gray-2); border-bottom: 1px solid var(--gray-5); }
.scheme-table td { padding: 10px 12px; border-bottom: 1px solid var(--gray-5); color: var(--gray-1); }
.scheme-table tr:hover td { background: var(--gray-6); }
.cost-summary { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-top: 12px; }
.cost-item { background: var(--gray-6); border-radius: var(--radius); padding: 16px; text-align: center; }
.cost-item .cost-label { font-size: 13px; color: var(--gray-3); margin-bottom: 6px; }
.cost-item .cost-value { font-size: 24px; font-weight: 700; color: var(--primary); }
.cost-item .cost-unit { font-size: 13px; color: var(--gray-3); margin-top: 4px; }
.cost-item.highlight { background: var(--primary-light); }
.table-wrap { overflow-x: auto; }
.layout-diagram { background: var(--gray-6); border-radius: var(--radius); padding: 16px; margin-top: 16px; min-height: 240px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.layout-diagram canvas { border: 1px solid var(--gray-4); border-radius: 4px; background: #fff; }
@media (max-width: 768px) {
  .main { padding: 0 12px; }
  .steps { padding: 12px 16px; overflow-x: auto; }
  .step-item { padding: 6px 12px; font-size: 13px; white-space: nowrap; }
  .cost-summary { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
<header class="header">
  <h1>零件包装方案推荐</h1>
  <span class="badge" id="statusBadge">等待输入</span>
</header>
<nav class="steps">
  <a href="/step1.html" class="step-item"><span class="step-num">1</span><span>输入零件参数</span></a>
  <span class="step-arrow">›</span>
  <a href="/step2.html" class="step-item"><span class="step-num">2</span><span>推荐包装方式</span></a>
  <span class="step-arrow">›</span>
  <a href="/step3.html" class="step-item active"><span class="step-num">3</span><span>包装成本测算</span></a>
</nav>
<main class="main">
  <div id="singleSchemePanel">
    <div class="card">
      <div class="card-title"><span class="icon">💰</span> 包装成本测算</div>
      <div id="schemeHeader" class="alert alert-success">请选择一个包装方式后查看方案详情。</div>
      <div class="table-wrap">
        <table class="scheme-table"><thead><tr><th>项目</th><th>结果</th><th>说明</th></tr></thead><tbody id="schemeBody"></tbody></table>
      </div>
      <div class="cost-summary" id="costSummary" style="margin-top:16px;"></div>
      <div class="card-title" style="margin-top:18px;"><span class="icon">🚢</span> 集装箱推荐</div>
      <div class="table-wrap">
        <table class="scheme-table"><thead><tr><th>集装箱</th><th>可装箱数</th><th>总件数</th><th>空间利用率</th><th>状态</th></tr></thead><tbody id="containerBody"></tbody></table>
      </div>
      <div class="layout-diagram"><canvas id="layoutCanvas" width="920" height="420"></canvas></div>
      <div style="margin-top:14px;text-align:right;"><button class="btn" onclick="exportStep3Results()">💾 导出方案 CSV</button></div>
    </div>
  </div>

  <div id="batchSchemePanel" style="display:none;">
    <div class="card">
      <div class="card-title"><span class="icon">💰</span> 批量包装成本测算</div>
      <div class="alert alert-success" id="batchSchemeHeader">批量包装方案统计</div>
      <div class="table-wrap">
        <table class="scheme-table">
          <thead><tr><th>包装材料</th><th>规格 (mm)</th><th>数量</th><th>单价 (元)</th><th>小计 (元)</th><th>辅料 (元)</th></tr></thead>
          <tbody id="batchSchemeBody"></tbody>
        </table>
      </div>
      <div id="batchPalletSummary" style="margin-top:16px;"></div>
      <div id="batchCostSummary" style="margin-top:16px;"></div>
      <div style="margin-top:14px;text-align:right;"><button class="btn" onclick="exportBatchSchemeResults()">💾 导出批量成本 CSV</button></div>
    </div>
  </div>

  <div class="btn-group">
    <a href="/step2.html" class="btn">‹ 返回上一步</a>
    <a href="/step1.html" class="btn">‹ 返回修改零件参数</a>
    <a href="/step1.html" class="btn btn-primary btn-lg" onclick="AppState.clear();return true;">重新测算</a>
  </div>
</main>

<script src="/js/common.js"></script>
<script src="/js/api.js"></script>
<script src="/js/pack.js"></script>
<script src="/js/step2.js"></script>
<script src="/js/step3.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async function() {
  await loadModelFromApi();
  initStep3();
});
</script>
</body>
</html>
